<head>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

      min-height: 100vh;
      display: flex;
      flex-direction: column;

      justify-content: center;
      padding: 2rem;

      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

    }
    p {
      font-size: 1rem;
      color: #e4e4e7;
      line-height: 1.6;
      max-width: 20rem;
    }
    p + p { margin-top: 0.75rem; color: #a1a1aa; }
